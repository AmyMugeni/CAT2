<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Save Our Wildlife</title>
    
    <link rel="stylesheet" href="styles.css" />
</head>
<body>

    <main class="card" role="main">

        <h1>🌿 Save Our Wildlife</h1>
        <div class="video-wrapper" id="videoWrapper">
            <video
                id="wildlifeVideo"
                src="wildlife.mp4"
                controls
                aria-label="Promotional video about saving wildlife"
                preload="metadata"
            >
                <p>Your browser does not support the video tag. Please download the video: <a href="wildlife.mp4">wildlife.mp4</a></p>
            </video>
        </div>
        <div class="description" aria-live="polite">
            <strong>🐾 Every species matters.</strong> This short film shows how our conservation efforts protect endangered animals and their habitats. Join us in making a difference.
        </div>
        <div class="btn-wrap">
            <button
                id="toggleBtn"
                class="toggle-btn"
                type="button"
                aria-controls="videoWrapper wildlifeVideo"
                aria-expanded="true"
            >
                <span id="btnIcon">⏸️</span>
                <span id="btnLabel">Hide &amp; Pause</span>
            </button>
        </div>

    </main>
    <script src="script.js"></script>

</body>
</html>
